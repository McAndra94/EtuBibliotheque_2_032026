# ------------------------------------------------------------
# SPRING BOOT CORE SETTINGS
# ------------------------------------------------------------
spring.application.name=etudiant-backend
server.port=8080

# Disable Docker Compose integration (using Colima, on macOS Tahoe)
spring.docker.compose.enabled=false

# ------------------------------------------------------------
# DATABASE CONFIGURATION (MySQL via Colima)
# ------------------------------------------------------------
DB_USER=etudiant
DB_PASSWORD=SuperStrongPassword123!
DB_HOST=localhost
DB_PORT=32773
DB_NAME=etudiant_db

# SpringBoot datasource
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------------------------
# JWT CONFIGURATION
# ------------------------------------------------------------
JWT_SECRET=Secret1?Secret2?Secret3?Secret4?
JWT_EXPIRATION_MS=3600000

# ------------------------------------------------------------
# LOGGING (debug for security + JWT)
# ------------------------------------------------------------
logging.level.org.springframework.security=DEBUG
logging.level.com.openclassrooms.etudiant=DEBUG
